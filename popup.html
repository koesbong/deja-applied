<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Déjà Applied</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 300px; font-family: -apple-system, "Google Sans", BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; color: #1f1f1f; background: #fff; }
    .popup-header { background: #0a66c2; color: white; padding: 16px; display: flex; align-items: center; gap: 10px; }
    .popup-logo { font-size: 20px; }
    .popup-title { font-size: 15px; font-weight: 700; line-height: 1.3; letter-spacing: -0.01em; }
    .popup-subtitle { font-size: 11px; opacity: 0.8; margin-top: 2px; }
    .popup-body { padding: 16px; }
    .status-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #5f6368; margin-bottom: 8px; font-weight: 600; }
    .status-section { margin-bottom: 16px; }
    .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .status-badge.signed-in { background: #e6f4ea; color: #137333; }
    .status-badge.signed-out { background: #fce8e6; color: #c5221f; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; }
    .signed-in .status-dot { background: #137333; }
    .signed-out .status-dot { background: #c5221f; }
    .btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 9px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 150ms; margin-bottom: 8px; }
    .btn-primary { background: #0a66c2; color: white; }
    .btn-primary:hover { background: #004182; }
    .btn-danger { background: #fff; color: #c5221f; border: 1px solid #f5c6c2; }
    .btn-danger:hover { background: #fce8e6; }
    .divider { height: 1px; background: #e0e0e0; margin: 14px 0; }
    .how-it-works { background: #f8f9fa; border-radius: 8px; padding: 12px; }
    .how-it-works-title { font-weight: 600; font-size: 12px; color: #3c4043; margin-bottom: 8px; }
    .how-it-works ol { padding-left: 16px; color: #5f6368; font-size: 12px; line-height: 1.7; }
    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
    #error-msg { color: #c5221f; font-size: 12px; margin-top: 8px; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="popup-header">
    <span class="popup-logo">🔍</span>
    <div>
      <div class="popup-title">Déjà Applied</div>
      <div class="popup-subtitle">Never apply to the same job twice</div>
    </div>
  </div>
  <div class="popup-body">
    <div class="status-section">
      <div class="status-label">Status</div>
      <div id="status-badge" class="status-badge signed-out">
        <span class="status-dot"></span>
        <span id="status-text">Checking…</span>
      </div>
    </div>
    <div id="signed-out-actions">
      <button class="btn btn-primary" id="signin-btn">Sign in with Google</button>
    </div>
    <div id="signed-in-actions" class="hidden">
      <button class="btn btn-danger" id="signout-btn">Sign out</button>
    </div>
    <div id="error-msg" class="hidden"></div>
    <div class="divider"></div>
    <div class="how-it-works">
      <div class="how-it-works-title">How it works</div>
      <ol>
        <li>Open any LinkedIn job email in Gmail</li>
        <li>Déjà Applied parses the company &amp; role</li>
        <li>Searches your Gmail for application acks</li>
        <li>Shows a warning if you've applied before</li>
      </ol>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
